name: Run Colab Notebook

on:
  schedule:
    - cron: "0 8 * * *"   # every day at 08:00 UTC — change to your preferred time
  workflow_dispatch:       # also allows manual trigger from GitHub Actions tab

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome + dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q wget
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb -O /tmp/chrome.deb
          sudo apt-get install -y -q /tmp/chrome.deb || sudo apt-get install -f -y -q
          google-chrome --version

      - name: Install Python deps
        run: pip install selenium webdriver-manager

      - name: Run Colab notebook
        env:
          GOOGLE_EMAIL:        ${{ secrets.GOOGLE_EMAIL }}
          GOOGLE_APP_PASSWORD: ${{ secrets.GOOGLE_APP_PASSWORD }}
          NOTEBOOK_URL:        ${{ secrets.NOTEBOOK_URL }}
        run: python run_colab.py

      - name: Upload screenshots
        if: always()           # upload even if the run failed
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
          retention-days: 7
