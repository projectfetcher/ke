name: Run Kenya MimusJobs

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  run-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK data
        run: |
          python -c "import nltk; nltk.download('punkt_tab', quiet=True); nltk.download('averaged_perceptron_tagger', quiet=True)"

      - name: Run job script
        run: python kenya_mimusjobs_mistral_v2.py

      - name: Upload tracker CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: processed-jobs-tracker
          path: kenya_processed_job_ids.csv
          retention-days: 30
