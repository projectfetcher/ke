name: Run Colab Notebook

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome (no chromedriver package needed)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q google-chrome-stable
          google-chrome --version

      - name: Install Python deps
        run: pip install selenium webdriver-manager

      - name: Run Colab notebook
        env:
          GOOGLE_EMAIL:        ${{ secrets.GOOGLE_EMAIL }}
          GOOGLE_APP_PASSWORD: ${{ secrets.GOOGLE_APP_PASSWORD }}
          NOTEBOOK_URL:        ${{ secrets.NOTEBOOK_URL }}
        run: python run_colab.py

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: "*.png"
          retention-days: 7
